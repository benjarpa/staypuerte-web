function busyDates(id,y,m){const s=new Set();const d=new Date(y,m,0).getDate();let seed=id*31+m*13;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff};for(let i=1;i<=d;i++){const dow=new Date(y,m-1,i).getDay();if((dow===0||dow===6)&&rnd()>0.35)s.add(i);else if(rnd()>0.78)s.add(i)}return s}

const GalleryModal = ({photos,start,onClose}) => {

    return()=>{document.body.style.overflow='';window.removeEventListener('keydown',fn)};
  },[]);
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <button onClick={onClose} style={{position:'absolute',top:'1.2rem',right:'1.5rem',background:'none',border:'none',color:'rgba(237,245,242,0.6)',fontSize:'1.5rem',cursor:'pointer'}}>✕</button>

const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const Calendar = ({propId}) => {
  const today=new Date();
  const months=Array.from({length:3},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()+i,1);return{y:d.getFullYear(),m:d.getMonth()+1,label:`${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`};});
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'2rem'}}>
        {months.map(({y,m,label})=>{
          const busy=busyDates(propId,y,m);
          const fdow=(new Date(y,m-1,1).getDay()+6)%7;
          const total=new Date(y,m,0).getDate();
          const cells=[...Array(fdow).fill(null),...Array.from({length:total},(_,i)=>i+1)];
          return (
            <div key={m}>
              <div style={{fontFamily:'Bebas Neue,sans-serif',letterSpacing:'0.1em',fontSize:'1rem',color:'#C8A86B',marginBottom:'0.8rem'}}>{label}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',fontSize:'0.7rem'}}>
                {['L','M','X','J','V','S','D'].map(d=><div key={d} style={{textAlign:'center',color:'rgba(237,245,242,0.3)',paddingBottom:'4px'}}>{d}</div>)}
                {cells.map((d,i)=>{
                  if(!d)return<div key={`e${i}`}/>;
                  const isPast=new Date(y,m-1,d)<today;
                  const isToday=y===today.getFullYear()&&m===(today.getMonth()+1)&&d===today.getDate();
                  const isBusy=busy.has(d);
                  return<div key={d} style={{textAlign:'center',padding:'5px 2px',borderRadius:'4px',background:isToday?'#C8A86B':isBusy?'rgba(212,94,40,0.15)':isPast?'transparent':'rgba(37,211,102,0.08)',color:isToday?'#0A1C27':isPast?'rgba(237,245,242,0.15)':isBusy?'rgba(212,94,40,0.7)':'rgba(74,222,128,0.9)',fontWeight:isToday?700:400,textDecoration:isPast?'line-through':'none'}}>{d}</div>;
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:'2rem',marginTop:'1.2rem'}}>
        <span style={{fontSize:'0.7rem',color:'rgba(74,222,128,0.9)'}}>● Disponible</span>
        <span style={{fontSize:'0.7rem',color:'rgba(212,94,40,0.7)'}}>● Ocupado</span>
        <span style={{fontSize:'0.7rem',color:'#C8A86B'}}>■ Hoy</span>
      </div>
    </div>
  );
};

                <div key={label} style={{display:'flex',alignItems:'center',gap:'0.8rem',padding:'0.5rem 0'}}>
                  <span style={{fontSize:'1.1rem'}}>{icon}</span>
                  <span style={{fontSize:'0.85rem',color:'rgba(237,245,242,0.65)'}}>{label}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{marginBottom:'2rem',paddingBottom:'2rem',borderBottom:'1px solid rgba(200,168,107,0.12)'}}>
            <h2 style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.5rem',letterSpacing:'0.06em',color:'#EDF5F2',marginBottom:'0.8rem'}}>Check-in / Check-out</h2>
            <div style={{display:'flex',gap:'3rem'}}>
              <div><div style={{fontSize:'0.65rem',letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(237,245,242,0.4)',marginBottom:'4px'}}>Check-in</div><div style={{fontSize:'1rem',color:'#C8A86B'}}>16:00 – 23:00</div></div>
              <div><div style={{fontSize:'0.65rem',letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(237,245,242,0.4)',marginBottom:'4px'}}>Check-out</div><div style={{fontSize:'1rem',color:'#C8A86B'}}>Antes de las 11:00</div></div>
              <div><div style={{fontSize:'0.65rem',letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(237,245,242,0.4)',marginBottom:'4px'}}>Mascotas</div><div style={{fontSize:'1rem',color:'rgba(74,222,128,0.8)'}}>Permitidas</div></div>
            </div>
          </div>

          <div id="disponibilidad" style={{marginBottom:'2.5rem'}}>
            <h2 style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.5rem',letterSpacing:'0.06em',color:'#EDF5F2',marginBottom:'0.4rem'}}>Disponibilidad</h2>
            <p style={{fontSize:'0.78rem',fontStyle:'italic',color:'rgba(237,245,242,0.4)',marginBottom:'0.6rem'}}>Disponibilidad orientativa — las fechas reales se confirman en Airbnb al momento de reservar.</p>
            <p style={{fontSize:'0.72rem',color:'rgba(200,168,107,0.5)',marginBottom:'1.5rem',letterSpacing:'0.05em'}}>⚠ Este calendario es ilustrativo y no refleja la disponibilidad real de Airbnb.</p>
            <Calendar propId={3}/>
          </div>
        </div>

        <div className="sticky-card" style={{position:'sticky',top:'80px'}}>
          <div style={{background:'#1B3D52',border:'1px solid rgba(200,168,107,0.18)',padding:'2rem'}}>
            <div style={{display:'flex',alignItems:'baseline',gap:'0.5rem',marginBottom:'0.4rem'}}>
              <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'2.2rem',color:'#EDF5F2'}}>$180.000</span>
              <span style={{fontSize:'0.75rem',color:'rgba(237,245,242,0.45)',letterSpacing:'0.1em'}}>CLP / noche</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'1.5rem'}}>
              <span style={{color:'#C8A86B',fontSize:'0.88rem'}}>★ 4.84</span>
              <span style={{fontSize:'0.75rem',color:'rgba(237,245,242,0.4)'}}>68 reseñas</span>
            </div>
            <a href="https://www.airbnb.cl/rooms/821921238436749471" target="_blank" rel="noopener" style={{display:'block',width:'100%',background:'#D45E28',color:'#EDF5F2',padding:'1rem',fontFamily:'DM Sans,sans-serif',fontSize:'0.8rem',letterSpacing:'0.18em',textTransform:'uppercase',textDecoration:'none',textAlign:'center',transition:'background 0.3s',marginBottom:'0.8rem'}} onMouseEnter={e=>e.currentTarget.style.background='#b84d20'} onMouseLeave={e=>e.currentTarget.style.background='#D45E28'}>Reservar en Airbnb</a>
            <a href="https://wa.me/56992908598?text=Hola%2C+me+interesa+Keola+Puertecillo+en+StayPuerte" target="_blank" rel="noopener" style={{display:'block',width:'100%',background:'transparent',border:'1px solid #25D366',color:'#25D366',padding:'0.9rem',fontFamily:'DM Sans,sans-serif',fontSize:'0.8rem',letterSpacing:'0.18em',textTransform:'uppercase',textDecoration:'none',textAlign:'center',transition:'all 0.3s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(37,211,102,0.08)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>💬 Consultar por WhatsApp</a>
            <div style={{borderTop:'1px solid rgba(200,168,107,0.12)',marginTop:'1.5rem',paddingTop:'1.5rem'}}>
              {[['Precio base','$180.000 / noche'],['Limpieza','$25.000'],['Cargo servicio','$18.000']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:'0.6rem',fontSize:'0.8rem'}}>
                  <span style={{color:'rgba(237,245,242,0.5)'}}>{k}</span><span style={{color:'rgba(237,245,242,0.75)'}}>{v}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',marginTop:'0.8rem',paddingTop:'0.8rem',borderTop:'1px solid rgba(200,168,107,0.1)',fontSize:'0.85rem'}}>
                <span style={{color:'#EDF5F2'}}>Total estimado</span>
                <span style={{color:'#C8A86B',fontFamily:'Bebas Neue,sans-serif',fontSize:'1.1rem'}}>$223.000</span>
              </div>
              <p style={{fontSize:'0.65rem',color:'rgba(237,245,242,0.28)',marginTop:'0.5rem',fontStyle:'italic'}}>* Estimado para 1 noche. El total real se calcula en Airbnb.</p>
            </div>
            <div style={{borderTop:'1px solid rgba(200,168,107,0.12)',marginTop:'1.5rem',paddingTop:'1.5rem',display:'flex',gap:'0.8rem',alignItems:'center'}}>
              <img src="staypuerte-logo.png" alt="StayPuerte" style={{height:'36px',width:'auto'}}/>
              <div>
                <div style={{fontSize:'0.78rem',color:'#EDF5F2',fontWeight:400}}>Gestionado por StayPuerte</div>
                <div style={{fontSize:'0.68rem',color:'rgba(237,245,242,0.4)',fontStyle:'italic'}}>Tasa de respuesta 100% · Responde en 1 hora</div>
              </div>
            </div>
          </div>
          <div style={{marginTop:'1rem',border:'1px solid rgba(200,168,107,0.12)',overflow:'hidden'}}>
            <iframe src="https://maps.google.com/maps?q=Navidad%2C+Chile&output=embed&hl=es&z=11" style={{width:'100%',height:'200px',border:'none',display:'block',filter:'saturate(0.6) brightness(0.8)'}} loading="lazy" title="Ubicación Keola Puertecillo"></iframe>
          </div>
        </div>
      </div>

      <footer style={{background:'#050f16',borderTop:'1px solid rgba(200,168,107,0.1)',padding:'2rem 5vw',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'1rem'}}>
        <a href="index.html"><img src="staypuerte-logo.png" alt="StayPuerte" style={{height:'36px',width:'auto'}}/></a>
        <span style={{fontSize:'0.68rem',color:'rgba(237,245,242,0.25)'}}>© 2026 StayPuerte · Puertecillo, Chile</span>
      </footer>

      {gallery!==null&&<GalleryModal photos={PHOTOS} start={gallery} onClose={()=>setGallery(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
