function busyDates(propId, year, month) {
  const busy = new Set();
  const days = new Date(year, month, 0).getDate();
  let seed = propId * 31 + month * 13;
  const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
  for (let d = 1; d <= days; d++) {
    const dow = new Date(year, month - 1, d).getDay();
    if ((dow === 0 || dow === 6) && rnd() > 0.35) busy.add(d);
    else if (rnd() > 0.78) busy.add(d);
  }
  return busy;
}

/* ════════════════════════════════════════════════
   AVAILABILITY CALENDAR
════════════════════════════════════════════════ */
const AvCalendar = ({ propId }) => {
  const today = new Date(2026, 3, 25);
  const months = [{ y:2026, m:4, label:'Abril 2026' }, { y:2026, m:5, label:'Mayo 2026' }];
  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1.5rem' }}>
        {months.map(({ y, m, label }) => {
          const busy = busyDates(propId, y, m);
          const firstDow = (new Date(y, m - 1, 1).getDay() + 6) % 7;
          const total = new Date(y, m, 0).getDate();
          const cells = [...Array(firstDow).fill(null), ...Array.from({ length: total }, (_, i) => i + 1)];
          return (
            <div key={m}>
              <div style={{ fontFamily:'Bebas Neue,sans-serif', letterSpacing:'0.1em', fontSize:'0.9rem', color:'#C8A86B', marginBottom:'0.6rem' }}>{label}</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'2px', fontSize:'0.68rem' }}>
                {['L','M','X','J','V','S','D'].map(d => <div key={d} style={{ textAlign:'center', color:'rgba(237,245,242,0.3)', padding:'3px 0' }}>{d}</div>)}
                {cells.map((d, i) => {
                  if (!d) return <div key={`e${i}`} />;
                  const isPast = new Date(y, m - 1, d) < today;
                  const isToday = y===2026 && m===4 && d===25;
                  const isBusy = busy.has(d);
                  return (
                    <div key={d} style={{ textAlign:'center', padding:'4px 1px', borderRadius:'3px',
                      background: isToday ? '#C8A86B' : isBusy ? 'rgba(212,94,40,0.2)' : isPast ? 'transparent' : 'rgba(37,211,102,0.1)',
                      color: isToday ? '#0A1C27' : isPast ? 'rgba(237,245,242,0.18)' : isBusy ? '#D45E28' : '#4ade80',
                      fontWeight: isToday ? 700 : 400,
                    }}>{d}</div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ display:'flex', gap:'1.5rem', marginTop:'0.8rem' }}>
        <span style={{ fontSize:'0.68rem', color:'#4ade80' }}>● Disponible</span>
        <span style={{ fontSize:'0.68rem', color:'#D45E28' }}>● Ocupado</span>
        <span style={{ fontSize:'0.68rem', color:'#C8A86B' }}>■ Hoy</span>
      </div>
    </div>
  );
};

const FotoSlot = ({ src, alt, height = '420px' }) => {
  const [err, setErr] = useState(false);
  return (
    <div style={{ width:'100%', height, overflow:'hidden', border:`1px solid ${P.accent}22`, position:'relative', background:P.deep }}>
      {!err
        ? <img src={src} alt={alt} onError={() => setErr(true)} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8, position:'relative', overflow:'hidden' }}>

              <defs><pattern id="slt" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(35)"><line x1="0" y1="0" x2="0" y2="22" stroke="#C8A86B" strokeWidth="1"/></pattern></defs>
              <rect width="100%" height="100%" fill="url(#slt)"/>
            </svg>
            <span style={{ fontFamily:'ui-monospace,monospace', fontSize:'0.6rem', letterSpacing:'0.2em', color:`${P.accent}55`, textTransform:'uppercase', position:'relative' }}>▢ {alt}</span>

      }
    </div>
  );
};

const ContactoPage = ({ setPage }) => {

    if (!n || !t) return alert('Por favor ingresa tu nombre y teléfono.');
    const txt = `Hola StayPuerte, soy ${n}. Tel: ${t}. ${m || 'Quiero más información.'}`;
    setSent(true);
    setTimeout(() => window.open(`https://wa.me/56992908598?text=${encodeURIComponent(txt)}`, '_blank'), 500);
    setTimeout(() => setSent(false), 3000);
  };

  const CANALES = [
    { icon:'💬', label:'WhatsApp', value:'+56 9 9290 8598', href:'https://wa.me/56992908598?text=Hola%2C+quiero+info+sobre+StayPuerte', cta:'Abrir chat' },

        <div style={{ position:'relative', maxWidth:'640px' }}>
          <span style={S.tag}>Contáctanos</span>
          <h1 style={{ ...S.title, fontSize: isMobile?'3.2rem':'clamp(3.5rem,7vw,6.5rem)', marginBottom:'1.4rem' }}>
            Hablemos<br/><span style={{ color:P.accent }}>sin vueltas</span>.
          </h1>
          <p style={{ fontSize:'1rem', fontStyle:'italic', color:`${P.text}70`, lineHeight:1.85, maxWidth:'480px' }}>
            Sea para arrendar, para sumarte como propietario o simplemente para preguntar — siempre hay alguien real al otro lado.
          </p>
        </div>
      </section>

      {/* CANALES */}
      <div style={{ background:P.alt, borderTop:`1px solid ${P.accent}18`, borderBottom:`1px solid ${P.accent}18`, padding: isMobile?'2.5rem 5vw':'3rem 5vw' }}>
        <div style={{ display:'grid', gridTemplateColumns: isMobile?'1fr':'repeat(3,1fr)', gap:'1px', background:`${P.accent}18` }}>
          {CANALES.map(c => (
            <div key={c.label} style={{ background:P.alt, padding:'2.4rem 2rem', textAlign:'center', transition:'background 0.3s' }}
              onMouseEnter={ev=>ev.currentTarget.style.background=P.bg} onMouseLeave={ev=>ev.currentTarget.style.background=P.alt}>
              <div style={{ fontSize:'1.8rem', marginBottom:'0.8rem' }}>{c.icon}</div>
              <div style={{ fontFamily:'Bebas Neue,sans-serif', fontSize:'1.1rem', letterSpacing:'0.1em', color:P.text, marginBottom:'0.3rem' }}>{c.label}</div>
              <div style={{ fontSize:'0.82rem', color:P.accent, marginBottom:'1.2rem', letterSpacing:'0.05em' }}>{c.value}</div>
              <a href={c.href} target="_blank" rel="noopener" style={{ ...S.btnOutline, padding:'0.6rem 1.4rem', fontSize:'0.65rem', justifyContent:'center' }}>{c.cta} →</a>
            </div>
          ))}
        </div>
      </div>

      {/* FORMULARIO + MAPA */}
      <section id="formulario" style={{ background:P.bg, padding: isMobile?'4rem 5vw':'7rem 5vw' }}>
        <div style={{ display:'grid', gridTemplateColumns: isMobile?'1fr':'1fr 1fr', gap: isMobile?'3rem':'5rem', maxWidth:'960px', margin:'0 auto' }}>
          <div>

            <div style={{ display:'flex', flexDirection:'column', gap:'0.8rem' }}>
              <input id="cnt-nombre" type="text" placeholder="Tu nombre" />
              <input id="cnt-tel" type="tel" placeholder="Tu teléfono (+56…)" />
              <input id="cnt-email" type="email" placeholder="Tu email (opcional)" />

              <button onClick={enviarWA} style={{ ...S.btnGreen, justifyContent:'center', opacity:sent?0.7:1, background:'rgba(237,245,242,0.1)', border:'1px solid rgba(237,245,242,0.18)', color:'rgba(237,245,242,0.75)', width:'100%', height:'52px' }}>

              <p style={{ fontSize:'0.88rem', fontStyle:'italic', color:`${P.text}65`, lineHeight:1.75 }}>

            <div style={{ flex:1, minHeight: isMobile?'220px':'280px', border:`1px solid ${P.accent}22`, overflow:'hidden' }}>

            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:'0.6rem' }}>
              {[['+56 9 9290 8598','tel:+56992908598'],['hola@staypuerte.cl','mailto:hola@staypuerte.cl']].map(([v,h]) => (
                <a key={v} href={h} style={{ fontSize:'0.82rem', color:`${P.accent}cc`, letterSpacing:'0.08em', textDecoration:'none', transition:'color 0.2s' }}
                  onMouseEnter={e=>e.target.style.color=P.accent} onMouseLeave={e=>e.target.style.color=`${P.accent}cc`}>→ {v}</a>
              ))}
            </div>
          </div>
        </div>
      </section>

      <footer style={{ background:'#050f16', borderTop:'1px solid rgba(200,168,107,0.1)', padding: isMobile?'2rem 5vw':'2.5rem 5vw', display:'flex', flexDirection: isMobile?'column':'row', alignItems: isMobile?'flex-start':'center', justifyContent:'space-between', flexWrap:'wrap', gap:'1.2rem' }}>
        <Logo onClick={() => setPage('home')} />
        <div style={{ display:'flex', gap: isMobile?'1rem 1.8rem':'2rem', flexWrap:'wrap' }}>
          {['+56 9 9290 8598','hola@staypuerte.cl','Puertecillo, Chile'].map(t => (
            <span key={t} style={{ fontSize:'0.68rem', color:'rgba(237,245,242,0.3)', letterSpacing:'0.12em', textTransform:'uppercase' }}>{t}</span>
          ))}
        </div>
        <span style={{ fontSize:'0.68rem', color:'rgba(237,245,242,0.2)' }}>© 2026 StayPuerte</span>
      </footer>
    </div>
  );
};

/* ════════════════════════════════════════════════
   APP
════════════════════════════════════════════════ */
const App = () => {
  const [page, setPage] = useState('home');
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => { window.scrollTo({ top: 0 }); }, [page]);

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 55);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <>
      {page !== 'home' && <Nav page={page} setPage={setPage} scrolled={scrolled} />}
      {page === 'home'         && <HomePage         setPage={setPage} />}
      {page === 'propietarios' && <PropietariosPage  setPage={setPage} />}
      {page === 'arrendar'     && <ArrendatariosPage setPage={setPage} />}
      {page === 'nosotros'     && <NosotrosPage      setPage={setPage} />}
      {page === 'contacto'     && <ContactoPage      setPage={setPage} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
